<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="blackbox-api-base" content="" />
    <title>BLACK BOX | Create account</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page page--auth">
      <header class="masthead masthead--simple" aria-label="Site header">
        <a class="brand brand--link" href="./index.html">
          <img
            class="brand__logo"
            src="./assets/blackboxlogo.png?v=20260402q"
            alt="BLACK BOX mark"
          />
        </a>
      </header>
      <main class="auth-main">
        <div class="auth-card card">
          <h1 class="auth-card__title">Create consumer account</h1>
          <p class="auth-card__lede">
            Self-service signup for <code>consumer_user</code> accounts. Internal
            operators are normally invited (see admin Users screen). The engine
            stores a password hash, sends a verification email, and records
            <code>accepted_risk_terms_at</code> per portal contract.
          </p>
          <div class="alert alert--info" id="api-info" hidden></div>
          <div class="alert alert--success" id="done-msg" role="status" hidden></div>
          <div class="alert alert--error" id="err-msg" role="alert" hidden></div>
          <form class="form" id="form" novalidate>
            <div class="field">
              <label class="field__label" for="username">Username</label>
              <input class="input" id="username" name="username" required autocomplete="username" />
            </div>
            <div class="field">
              <label class="field__label" for="email">Email</label>
              <input class="input" id="email" name="email" type="email" required autocomplete="email" />
            </div>
            <div class="field">
              <label class="field__label" for="password">Password</label>
              <input
                class="input"
                id="password"
                name="password"
                type="password"
                required
                minlength="10"
                autocomplete="new-password"
              />
            </div>
            <div class="field field--checkbox">
              <label class="field__label field__label--inline">
                <input type="checkbox" id="terms" name="terms" required />
                I accept the portal risk and consent terms.
              </label>
            </div>
            <button class="button button--primary button--block" type="submit" id="btn">
              Create account
            </button>
          </form>
          <p class="auth-footer-links">
            <a href="./login.html">Already have an account</a>
          </p>
        </div>
      </main>
    </div>
    <script src="./app.js"></script>
    <script>
      (function () {
        var form = document.getElementById("form");
        var err = document.getElementById("err-msg");
        var done = document.getElementById("done-msg");
        var apiInfo = document.getElementById("api-info");
        var btn = document.getElementById("btn");

        if (!window.BlackboxPortal.readApiBase()) {
          apiInfo.textContent =
            "API not configured. Engine must implement POST " +
            window.BlackboxPortal.ACCOUNT_API.register +
            " and send the verification email.";
          apiInfo.hidden = false;
          btn.disabled = true;
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          err.hidden = true;
          done.hidden = true;
          if (!document.getElementById("terms").checked) {
            err.textContent = "You must accept the terms.";
            err.hidden = false;
            return;
          }
          var body = {
            username: document.getElementById("username").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
            accept_risk_terms: true,
          };
          window.BlackboxPortal.account
            .register(body)
            .then(function () {
              done.textContent =
                "Check your email to verify your address, then sign in.";
              done.hidden = false;
              form.reset();
            })
            .catch(function (x) {
              err.textContent = (x && x.message) || "Registration failed.";
              err.hidden = false;
            });
        });
      })();
    </script>
  </body>
</html>
