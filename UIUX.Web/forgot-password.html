<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="blackbox-api-base" content="" />
    <title>BLACK BOX | Reset password</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page page--auth">
      <header class="masthead masthead--simple" aria-label="Site header">
        <a class="brand brand--link" href="./index.html">
          <img
            class="brand__logo"
            src="./assets/blackboxlogo.png?v=20260402q"
            alt="BLACK BOX mark"
          />
        </a>
      </header>
      <main class="auth-main">
        <div class="auth-card card">
          <h1 class="auth-card__title">Forgot password</h1>
          <p class="auth-card__lede">
            Standard self-service flow (OWASP-style): we show the same message
            whether or not the email exists, so addresses cannot be enumerated.
            The engine sends a time-limited link when the API is enabled.
          </p>
          <div class="alert alert--info" id="api-info" hidden></div>
          <div
            class="alert alert--success"
            id="done-msg"
            role="status"
            hidden
          ></div>
          <div class="alert alert--error" id="err-msg" role="alert" hidden></div>
          <form class="form" id="form" novalidate>
            <div class="field">
              <label class="field__label" for="email">Email</label>
              <input
                class="input"
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
              />
            </div>
            <button class="button button--primary button--block" type="submit" id="btn">
              Send reset link
            </button>
          </form>
          <p class="auth-footer-links">
            <a href="./login.html">Back to sign in</a>
            <a href="./register.html">Create account</a>
          </p>
        </div>
      </main>
    </div>
    <script src="./app.js"></script>
    <script>
      (function () {
        var form = document.getElementById("form");
        var err = document.getElementById("err-msg");
        var done = document.getElementById("done-msg");
        var apiInfo = document.getElementById("api-info");
        var btn = document.getElementById("btn");
        var genericDone =
          "If an account exists for that email, password reset instructions were sent. Check your inbox and spam folder.";

        function hideAll() {
          err.hidden = true;
          done.hidden = true;
          apiInfo.hidden = true;
        }

        if (!window.BlackboxPortal.readApiBase()) {
          apiInfo.textContent =
            "Portal API base is not configured on this host. Password reset email cannot be sent until the engine exposes POST " +
            window.BlackboxPortal.ACCOUNT_API.passwordResetRequest +
            " (see app.js).";
          apiInfo.hidden = false;
          btn.disabled = true;
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          hideAll();
          var email = document.getElementById("email").value.trim();
          if (!email) return;
          window.BlackboxPortal.account
            .requestPasswordReset(email)
            .then(function () {
              done.textContent = genericDone;
              done.hidden = false;
              form.reset();
            })
            .catch(function (x) {
              err.textContent =
                (x && x.message) ||
                "Request failed. Try again later or contact support.";
              err.hidden = false;
            });
        });
      })();
    </script>
  </body>
</html>
