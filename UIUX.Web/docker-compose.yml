# BLACK BOX UI — nginx + TLS in Docker.
#
# Browser: https://127.0.0.1/  or  https://172.20.2.161/  (port 443 is default for https://)
# First visit: accept the dev self-signed certificate warning.
#
# Docker maps: host port 443 -> container port 443 (TLS). Port 80 redirects to HTTPS.
#
# Run:  cd UIUX.Web && docker compose up --build
# API image (policy intake needs node/npx): Dockerfile.api — after changing it run: docker compose build api
#
# Clawbot / split-tunnel: Binance REST must use the host routing table (WireGuard to Binance only).
# Bridge-network containers often see HTTP 451 and stall ``binance_strategy_bars_5m``; the API
# Binance ping then shows REST · down. ``api`` + ``binance-strategy-bars-sync`` use host network;
# ``web`` + ``sequential-tick`` reach the API via host.docker.internal:8080 (requires free host :8080).
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: uiuxweb-api:3.11-node
    working_dir: /repo
    # Same egress as host WG split-tunnel — required for Binance klines + /api/v1/market/binance/ping.
    network_mode: host
    # Install minimal deps not present in the bare image (sequential learning imports pydantic).
    command:
      [
        "sh",
        "-c",
        "pip install -q --no-cache-dir 'pydantic>=2,<3' certifi base58 PyNaCl && exec python3 UIUX.Web/api_server.py",
      ]
    environment:
      BLACKBOX_REPO_ROOT: /repo
      # Same DB file as pyth-sse-ingest (default: /repo/data/sqlite/market_data.db if unset).
      BLACKBOX_MARKET_DATA_PATH: ${BLACKBOX_MARKET_DATA_PATH:-}
      BLACKBOX_CONTEXT_ROOT: /repo/data/context_engine
      # Host .env (same directory as compose) supplies these; enables true wallet_connected on clawbot.
      KEYPAIR_PATH: ${KEYPAIR_PATH:-}
      BLACKBOX_SOLANA_KEYPAIR_PATH: ${BLACKBOX_SOLANA_KEYPAIR_PATH:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-}
      BLACKBOX_LIVE_TRADING_BLOCKED: ${BLACKBOX_LIVE_TRADING_BLOCKED:-1}
      BLACKBOX_EXECUTION_LEDGER_PATH: ${BLACKBOX_EXECUTION_LEDGER_PATH:-}
      # Kitchen ↔ SeanV3 Jupiter (DV-074/075/072). Default: operator-facing origin (same host:port as browser).
      KITCHEN_JUPITER_CONTROL_BASE: ${KITCHEN_JUPITER_CONTROL_BASE:-http://upvlt.greyllc.net:707}
      KITCHEN_JUPITER_OPERATOR_TOKEN: ${KITCHEN_JUPITER_OPERATOR_TOKEN:-}
      # Kitchen ↔ BlackBox policy control plane (DV-071). Loopback to this api_server when using network_mode: host.
      KITCHEN_BLACKBOX_CONTROL_BASE: ${KITCHEN_BLACKBOX_CONTROL_BASE:-http://127.0.0.1:8080}
      KITCHEN_BLACKBOX_OPERATOR_TOKEN: ${KITCHEN_BLACKBOX_OPERATOR_TOKEN:-}
      # Baseline bridge: Sean Jupiter lifecycle only (legacy mechanical writer removed from runtime).
      BASELINE_LEDGER_SIGNAL_MODE: sean_jupiter_v1
      BASELINE_LEGACY_MECHANICAL_ALLOWED: "0"
      # Measurement: economic paper (ledger pnl_usd) for baseline pairing. Stub requires ANNA_PARALLEL_STUB_LAB=1 on host running Karpathy.
      ANNA_PARALLEL_STRATEGY_MODE: ${ANNA_PARALLEL_STRATEGY_MODE:-paper}
      # Require Hermes SSE → market_ticks tape for Anna preflight (matches pyth-sse-ingest service).
      ANNA_PREFLIGHT_REQUIRE_PYTH_SSE: "1"
      ANNA_PYTH_SSE_MAX_AGE_SEC: "180"
      # Same 5m bar semantics as pyth-sse-ingest when recorder refreshes canonical bars.
      MARKET_BAR_MEMBERSHIP: oracle_publish
    volumes:
      - ../:/repo
      - /mnt/SQLlite_dB:/mnt/SQLlite_dB
    # Avoid nginx 502 while pip runs before api_server.py binds :8080 (Connection refused to upstream).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import socket; s=socket.socket(); s.settimeout(2); s.connect((\"127.0.0.1\", 8080)); s.close()"',
        ]
      interval: 5s
      timeout: 4s
      retries: 18
      start_period: 120s
    restart: unless-stopped

  sequential-tick:
    image: python:3.11-alpine
    working_dir: /repo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BLACKBOX_REPO_ROOT: /repo
      BLACKBOX_API_TICK_URL: http://host.docker.internal:8080/api/v1/sequential-learning/control/tick
      SEQUENTIAL_TICK_INTERVAL_SEC: "5"
      SEQUENTIAL_TICK_MAX_EVENTS: "5"
    command: ["python3", "scripts/runtime/sequential_http_tick_loop.py"]
    volumes:
      - ../:/repo
    depends_on:
      - api
    restart: unless-stopped

  pyth-stream:
    image: python:3.11-alpine
    working_dir: /repo
    environment:
      BLACKBOX_REPO_ROOT: /repo
    command: ["python3", "scripts/trading/pyth_stream_probe.py"]
    volumes:
      - ../:/repo
      - /mnt/SQLlite_dB:/mnt/SQLlite_dB
    restart: unless-stopped

  # Hermes SSE → market_ticks (full Pyth update stream into SQLite; not REST polling).
  pyth-sse-ingest:
    image: python:3.11-alpine
    working_dir: /repo
    environment:
      BLACKBOX_REPO_ROOT: /repo
      BLACKBOX_MARKET_DATA_PATH: ${BLACKBOX_MARKET_DATA_PATH:-}
      BLACKBOX_EXECUTION_LEDGER_PATH: ${BLACKBOX_EXECUTION_LEDGER_PATH:-}
      BASELINE_LEDGER_SIGNAL_MODE: sean_jupiter_v1
      BASELINE_LEGACY_MECHANICAL_ALLOWED: "0"
      # Sean / full tape: one SQLite row per Hermes SSE parse (PYTH_SSE_TICK_POLICY=every_message).
      # Ingest code defaults unknown typos to every_message (never silently to price_change).
      PYTH_SSE_TICK_POLICY: every_message
      # Do not drop parses on conf/price (full broadcast accountability). Set to 1 for legacy conf gate.
      PYTH_SSE_APPLY_CONF_GATE: "0"
      MARKET_BAR_MEMBERSHIP: oracle_publish
    command:
      [
        "sh",
        "-c",
        "pip install -q --no-cache-dir certifi && exec python3 scripts/trading/pyth_sse_ingest.py",
      ]
    volumes:
      - ../:/repo
      - /mnt/SQLlite_dB:/mnt/SQLlite_dB
    restart: unless-stopped

  # Jupiter_3: advance ``binance_strategy_bars_5m`` on a timer (Binance REST). Without this service,
  # the table stalls after a manual one-shot sync — temporal failure for closed-bar evaluation.
  binance-strategy-bars-sync:
    image: python:3.11-alpine
    network_mode: host
    working_dir: /repo
    environment:
      BLACKBOX_REPO_ROOT: /repo
      BLACKBOX_MARKET_DATA_PATH: ${BLACKBOX_MARKET_DATA_PATH:-}
      BINANCE_STRATEGY_SYNC_INTERVAL_SEC: ${BINANCE_STRATEGY_SYNC_INTERVAL_SEC:-30}
    command:
      [
        "sh",
        "-c",
        "pip install -q --no-cache-dir certifi && exec python3 scripts/runtime/binance_strategy_bars_sync_loop.py",
      ]
    volumes:
      - ../:/repo
      - /mnt/SQLlite_dB:/mnt/SQLlite_dB
    restart: unless-stopped

  web:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
      pyth-stream:
        condition: service_started
      pyth-sse-ingest:
        condition: service_started
      sequential-tick:
        condition: service_started
    ports:
      - "443:443"
      - "80:80"
    # Host repo config — avoids 404 on /anna/* after git pull without rebuilding the image.
    # Optional TLS: place fullchain.pem + privkey.pem in ./ssl/ (e.g. certbot or internal CA).
    # When missing, container uses the baked self-signed cert (browser warning).
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl/host:ro
    restart: unless-stopped
