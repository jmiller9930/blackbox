<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="blackbox-api-base" content="" />
    <title>BLACK BOX | Set new password</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page page--auth">
      <header class="masthead masthead--simple" aria-label="Site header">
        <a class="brand brand--link" href="./index.html">
          <img
            class="brand__logo"
            src="./assets/blackboxlogo.png"
            alt="BLACK BOX mark"
          />
        </a>
      </header>
      <main class="auth-main">
        <div class="auth-card card">
          <h1 class="auth-card__title">Set new password</h1>
          <p class="auth-card__lede">
            Open this page from the link in your email. The token is single-use and
            expires on the server.
          </p>
          <div class="alert alert--info" id="api-info" hidden></div>
          <div class="alert alert--success" id="done-msg" role="status" hidden></div>
          <div class="alert alert--error" id="err-msg" role="alert" hidden></div>
          <form class="form" id="form" novalidate>
            <div class="field">
              <label class="field__label" for="password">New password</label>
              <input
                class="input"
                id="password"
                name="password"
                type="password"
                autocomplete="new-password"
                required
                minlength="10"
              />
            </div>
            <div class="field">
              <label class="field__label" for="password2">Confirm password</label>
              <input
                class="input"
                id="password2"
                name="password2"
                type="password"
                autocomplete="new-password"
                required
                minlength="10"
              />
            </div>
            <button class="button button--primary button--block" type="submit" id="btn">
              Update password
            </button>
          </form>
          <p class="auth-footer-links">
            <a href="./login.html">Sign in</a>
          </p>
        </div>
      </main>
    </div>
    <script src="./app.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var token = params.get("token") || "";
        var form = document.getElementById("form");
        var err = document.getElementById("err-msg");
        var done = document.getElementById("done-msg");
        var apiInfo = document.getElementById("api-info");
        var btn = document.getElementById("btn");

        if (!window.BlackboxPortal.readApiBase()) {
          apiInfo.textContent =
            "API not configured. Engine must accept POST " +
            window.BlackboxPortal.ACCOUNT_API.passwordResetComplete +
            " with { token, new_password }.";
          apiInfo.hidden = false;
          btn.disabled = true;
        }
        if (!token) {
          err.textContent =
            "Missing reset token. Use the full link from your email.";
          err.hidden = false;
          btn.disabled = true;
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          err.hidden = true;
          done.hidden = true;
          var p1 = document.getElementById("password").value;
          var p2 = document.getElementById("password2").value;
          if (p1 !== p2) {
            err.textContent = "Passwords do not match.";
            err.hidden = false;
            return;
          }
          window.BlackboxPortal.account
            .completePasswordReset(token, p1)
            .then(function () {
              done.textContent =
                "Password updated. You can sign in with your new password.";
              done.hidden = false;
              form.hidden = true;
            })
            .catch(function (x) {
              err.textContent =
                (x && x.message) ||
                "Reset failed. The link may have expired. Request a new one.";
              err.hidden = false;
            });
        });
      })();
    </script>
  </body>
</html>
