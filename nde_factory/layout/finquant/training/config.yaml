# FinQuant NDE canonical training config (relative to FINQUANT_BASE=/data/NDE/finquant).
# Mirrors finquant/training/config_v0.1.yaml shape for autonomous LangGraph runs.
#
# Progressive default: certified v0.2 baseline corpus (`v0.2c_combined.jsonl`) copied into
# NDE staging by scripts/install_nde_data_layout.sh when present under /data/finquant-1/...
# Override ``dataset`` or ``data.staging_jsonl`` only when intentionally using new processed data.

model_name_or_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

# Explicit absolute path (resolver tries this before relative data.staging_jsonl).
dataset: /data/NDE/finquant/datasets/staging/v0.2c_combined.jsonl

data:
  staging_jsonl: datasets/staging/v0.2c_combined.jsonl
  max_seq_length: 4096

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  seed: 42
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true
  bf16: true
  fp16: false

  smoke:
    output_dir: adapters/finquant-smoke-v0.1
    max_steps: 50
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    logging_steps: 10
    save_steps: 50
    save_total_limit: 2

  full:
    output_dir: adapters/finquant-full-v0.1
    max_steps: 3000
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    logging_steps: 50
    save_steps: 500
    save_total_limit: 3
