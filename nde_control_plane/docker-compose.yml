# NDE Studio — Control Plane UI (optional; requires a working docker compose plugin)
#
# If docker-compose v1 / Python shim is broken, use plain Docker instead:
#   ./run-docker.sh
#
# Compose equivalent:
#   cd nde_control_plane && docker compose up -d --build
# URL: http://127.0.0.1:3999
services:
  nde-studio:
    build: .
    image: nde-studio:local
    ports:
      - "3999:3999"
    environment:
      PORT: "3999"
      NDE_DATA_ROOT: /data/NDE
      REPO_MOUNT: /repo
      FINQUANT_LEGACY_ROOT: /data/finquant-1
    volumes:
      - /data/NDE:/data/NDE
      - /data/finquant-1:/data/finquant-1
      - ${HOME}/blackbox:/repo:ro
