# EXAMPLE ONLY — copy to /etc/wireguard/ on clawbot, set permissions 600, insert real keys from Proton.
# CRITICAL: AllowedIPs must list ONLY Binance-related destination prefixes (see VPN/README.md).
# Never use 0.0.0.0/0 or ::/0 here on the lab host.
# Everything else (US APIs, general web, internal LAN, SSH) stays on normal routing — not listed here.

[Interface]
PrivateKey = REPLACE_WITH_PROTON_WIREGUARD_PRIVATE_KEY
Address = 10.2.0.2/32
# Optional: omit DNS line so system resolver handles internal + public names.
# DNS = 10.2.0.1

[Peer]
# Values from Proton WireGuard profile download for the chosen exit.
PublicKey = REPLACE_WITH_PEER_PUBLIC_KEY
Endpoint = REPLACE_WITH_HOST:51820
AllowedIPs = 203.0.113.0/32
# ^ PLACEHOLDER ONLY. Replace with real Binance API destination prefixes /32 or CIDRs
# that engineering maintains (CDN — expect drift; use resolve+cron or approved list).
PersistentKeepalive = 25
