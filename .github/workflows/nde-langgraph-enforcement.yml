name: NDE LangGraph enforcement

on:
  push:
    paths:
      - "nde/**"
      - "nde_factory/layout/**"
      - "scripts/install_nde_data_layout.sh"
      - "nde/tools/check_langgraph_enforcement.py"
      - ".github/workflows/nde-langgraph-enforcement.yml"
  pull_request:
    paths:
      - "nde/**"
      - "nde_factory/layout/**"
      - "scripts/install_nde_data_layout.sh"
      - "nde/tools/check_langgraph_enforcement.py"
      - ".github/workflows/nde-langgraph-enforcement.yml"

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check LangGraph orchestration rules
        run: python3 nde/tools/check_langgraph_enforcement.py
