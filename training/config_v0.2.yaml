# FinQuant-1 QLoRA training — v0.2
# Remediation run: adds 100 exam-targeted rows (ATR hard rule, lookahead,
# same-bar kill, funding sign, abstention) to training corpus.
# Base model: DeepSeek-R1-Distill-Qwen-7B (same as v0.1).
# Dataset: merged_finquant_v0.3.jsonl (246 train + 100 remediation = 346 rows)

model_name_or_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

data:
  staging_jsonl: datasets/merged_finquant_v0.3.jsonl
  max_seq_length: 4096

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  seed: 42
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true
  bf16: true
  fp16: false

  smoke:
    output_dir: adapters/finquant-1-qwen7b-v0.2-smoke
    max_steps: 200
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    logging_steps: 10
    save_steps: 200
    save_total_limit: 2

  full:
    output_dir: adapters/finquant-1-qwen7b-v0.2
    max_steps: 3000
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    logging_steps: 50
    save_steps: 500
    save_total_limit: 3
