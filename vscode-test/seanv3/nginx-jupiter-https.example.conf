# Example: terminate HTTPS in front of Jupiter (Node still listens on plain HTTP :707).
#
# Optional bare-metal alternative — does NOT modify BlackBox UIUX.Web nginx.
# Prefer the Jupiter-only Docker sidecar: docker-compose.jupiter-https.yml (Caddy on host :8443).
#
# Install on the host that receives WAN traffic (or a DMZ proxy), not inside the jupiter-web container.
# Adjust server_name, certificate paths, and upstream port if needed.
#
# Typical flow:
#   1. Point DNS for your public hostname to this host (or your edge that forwards to it).
#   2. certbot certonly --nginx -d your.hostname.example   (or use your org PKI paths below)
#   3. Copy this file into /etc/nginx/sites-available/ (or conf.d/), symlink sites-enabled, nginx -t && reload
#
# If this machine already serves BlackBox on :443 (UIUX.Web), use a different host:port for Jupiter,
# or the Jupiter-only Caddy sidecar on :8443 instead of sharing nginx.
#
# After HTTPS works in the browser:
#   - Set JUPITER_PUBLIC_BASE_URL=https://your.hostname.example  (no :443)
#   - Set JUPITER_SESSION_COOKIE_SECURE=1  on jupiter-web (env / compose)
#   - Restart jupiter-web

server {
    listen 80;
    listen [::]:80;
    server_name your.hostname.example;
    # ACME http-01 (certbot) or redirect only:
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your.hostname.example;

    ssl_certificate     /etc/letsencrypt/live/your.hostname.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.hostname.example/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;  # if certbot dropped it
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Jupiter (docker jupiter-web with network_mode: host binds 707 on the host)
    location / {
        proxy_pass http://127.0.0.1:707;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
