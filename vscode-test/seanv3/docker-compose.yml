# Run on clawbot: docker compose up -d --build
#
# --- Binance / VPN compliance (NON-NEGOTIABLE) ---
# This service MUST use the HOST routing table so HTTPS to api.binance.com matches clawbot's
# WireGuard split-tunnel (wg-proton-mx, narrow AllowedIPs). See VPN/README.md ("Traffic model",
# "Scope — host networking"). Do NOT switch to bridge/NAT-only networking for production: Binance
# often returns HTTP 451 when packets exit the wrong NIC. There is NO VPN client inside this image;
# Proton runs on the host kernel only.
#
# network_mode: host — required (see above).
#
# NDJSON: tail -f capture/seanv3.ndjson
# SQLite: capture/sean_parity.db — klines + Sean-native paper ledger (sean_paper_trades, …)
# Backfill ~3 days (864 bars; max 1000/request) — use the host script (preflights Proton/Binance path):
#   ./run-backfill-clawbot.sh
# Raw:
#   docker compose run --rm -e SQLITE_PATH=/capture/sean_parity.db -e LIMIT=864 seanv3 \
#     node --experimental-sqlite backfill.mjs
# Optional external compare jobs exist elsewhere in the monorepo — not part of SeanV3 runtime.
#
# Jupiter read-only web UI: host :707 — http://clawbot.a51.corp:707/ or WAN http://jupv3.greyllc.net:737/ (JUPITER_WEB_PORT default 707). jupiter-web runs as root so Node can bind :707 on Linux.
services:
  seanv3:
    build: .
    image: seanv3:local
    container_name: seanv3
    # Required for Binance via Proton on host — do not remove (VPN/README.md).
    network_mode: host
    restart: unless-stopped
    environment:
      # Same origin as BlackBox Python/Node (scripts/runtime/market_data/public_data_urls.py).
      # Host WireGuard steers this host to Proton per VPN/README.md — no VPN inside the container.
      BINANCE_API_BASE_URL: ${BINANCE_API_BASE_URL:-https://api.binance.com}
      # Optional: full klines URL override (else built from BINANCE_API_BASE_URL in app.mjs).
      # BINANCE_KLINES_URL: https://api.binance.com/api/v3/klines?symbol=SOLUSDT&interval=5m&limit=1
      POLL_INTERVAL_MS: "300000"
      CAPTURE_PATH: /capture/seanv3.ndjson
      SQLITE_PATH: /capture/sean_parity.db
      # Optional: Solana keypair JSON (same format as solana-keygen). Only pubkey is stored in DB.
      KEYPAIR_PATH: /capture/keypair.json
      # RPC for cached on-chain SOL balance (operator gate when sean_funding_mode=chain).
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      # Paper (default). For live-capital path later: set "0" and follow operator governance — TUI `--actual` only shows intent.
      PAPER_TRADING: "1"
      # Simulated "account" for testing (USD label — no real custody). Frozen in DB on first run.
      SEAN_PAPER_STARTING_BALANCE_USD: "1000"
      # Sean-native paper engine (no BlackBox). Set "0" to disable.
      SEAN_ENGINE_SLICE: "1"
      # jupiter_4 (default) = same gates as BlackBox JUPv4; jupiter_3 = legacy BOS stack in Node.
      SEAN_JUPITER_POLICY: ${SEAN_JUPITER_POLICY:-jupiter_4}
      # SEAN_ENGINE_SIZE_NOTIONAL_SOL: "1.0"
    volumes:
      - ./capture:/capture

  # Jupiter — read-only dashboard; shares SQLite with seanv3 (host network → port 707 on host).
  # build: . — same image as seanv3; avoids compose trying to pull seanv3:local from a registry.
  # user: root — bind to :707 on Linux (port <1024); seanv3 stays non-root.
  jupiter-web:
    build: .
    image: seanv3:local
    container_name: jupiter-web
    network_mode: host
    user: "0:0"
    # Image bakes /app/*.mjs at build time; repo is mounted at /repo. Sync JS + static from the mount
    # into /app on each start so git pull + restart picks up dashboard/API changes without rebuilding.
    command:
      - sh
      - -c
      - |
          set -e
          cp /repo/vscode-test/seanv3/*.mjs /app/
          cp -r /repo/vscode-test/seanv3/static /app/
          exec node --experimental-sqlite /app/jupiter_web.mjs
    env_file:
      # Committed lab token + optional Bearer prefill (see lab_operator_token.env).
      - lab_operator_token.env
      # Auth mode + email + public URL (see ../lab_dashboard_login.defaults.env). Secrets: use ../.env (compose dir) or host env.
      - ../lab_dashboard_login.defaults.env
    environment:
      SQLITE_PATH: /capture/sean_parity.db
      JUPITER_WEB_PORT: "707"
      JUPITER_WEB_BIND: "0.0.0.0"
      # Override: set JUPITER_OPERATOR_TOKEN in shell or a local .env used only for compose interpolation if you extend this file.
      # Paper starting balance (USD) — operator can POST from Jupiter dashboard when token is set.
      SEAN_ALLOW_PAPER_STAKE_EDIT: ${SEAN_ALLOW_PAPER_STAKE_EDIT:-1}
      # Same Binance origin as seanv3 (host routes per VPN/README.md).
      BINANCE_API_BASE_URL: ${BINANCE_API_BASE_URL:-https://api.binance.com}
      # Mirror seanv3 so the dashboard shows which Node policy the engine uses.
      SEAN_JUPITER_POLICY: ${SEAN_JUPITER_POLICY:-jupiter_4}
      # 1 = block POST /api/operator/*; sole write remains POST /api/v1/jupiter/active-policy (Bearer), validated policy id only.
      JUPITER_WEB_READ_ONLY: ${JUPITER_WEB_READ_ONLY:-1}
      # Repo mount: policy registry + execution_ledger parity (read-only).
      BLACKBOX_REPO_ROOT: /repo
      BLACKBOX_EXECUTION_LEDGER_PATH: /repo/data/sqlite/execution_ledger.db
      # Session auth (required when JUPITER_AUTH_MODE=session): set in vscode-test/seanv3/.env (gitignored) or export before compose.
      JUPITER_SESSION_SECRET: ${JUPITER_SESSION_SECRET:-}
      # Password reset email: SMTP (e.g. Gmail App Password) if set; else Resend; else logs only.
      JUPITER_SMTP_HOST: ${JUPITER_SMTP_HOST:-}
      JUPITER_SMTP_PORT: ${JUPITER_SMTP_PORT:-}
      JUPITER_SMTP_SECURE: ${JUPITER_SMTP_SECURE:-}
      JUPITER_SMTP_USER: ${JUPITER_SMTP_USER:-}
      JUPITER_SMTP_PASS: ${JUPITER_SMTP_PASS:-}
      JUPITER_SMTP_FROM: ${JUPITER_SMTP_FROM:-}
      JUPITER_SMTP_REQUIRE_TLS: ${JUPITER_SMTP_REQUIRE_TLS:-}
      JUPITER_SMTP_DEBUG: ${JUPITER_SMTP_DEBUG:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      # Do not set JUPITER_AUTH_BOOTSTRAP_PASSWORD here — an empty ${...:-} overrides env_file and
      # skips first-time user creation; lab defaults come from ../lab_dashboard_login.defaults.env.
      JUPITER_AUTH_USERNAME: ${JUPITER_AUTH_USERNAME:-admin}
    volumes:
      - ./capture:/capture
      - ../../:/repo:ro
    depends_on:
      - seanv3
    restart: unless-stopped
