# Run on clawbot: docker compose up -d --build
#
# --- Binance / VPN compliance (NON-NEGOTIABLE) ---
# This service MUST use the HOST routing table so HTTPS to api.binance.com matches clawbot's
# WireGuard split-tunnel (wg-proton-mx, narrow AllowedIPs). See VPN/README.md ("Traffic model",
# "Scope — host networking"). Do NOT switch to bridge/NAT-only networking for production: Binance
# often returns HTTP 451 when packets exit the wrong NIC. There is NO VPN client inside this image;
# Proton runs on the host kernel only.
#
# network_mode: host — required (see above).
#
# NDJSON: tail -f capture/seanv3.ndjson
# SQLite: capture/sean_parity.db — table sean_binance_kline_poll
# Backfill ~3 days (864 bars; max 1000/request) — use the host script (preflights Proton/Binance path):
#   ./run-backfill-clawbot.sh
# Raw:
#   docker compose run --rm -e SQLITE_PATH=/capture/sean_parity.db -e LIMIT=864 seanv3 \
#     node --experimental-sqlite backfill.mjs
# Compare to Blackbox (from repo root): PYTHONPATH=. python3 -m modules.anna_training.jup_v3_parity_compare ...
services:
  seanv3:
    build: .
    container_name: seanv3
    # Required for Binance via Proton on host — do not remove (VPN/README.md).
    network_mode: host
    restart: unless-stopped
    environment:
      BINANCE_KLINES_URL: https://api.binance.com/api/v3/klines?symbol=SOLUSDT&interval=5m&limit=1
      POLL_INTERVAL_MS: "300000"
      CAPTURE_PATH: /capture/seanv3.ndjson
      SQLITE_PATH: /capture/sean_parity.db
      # Optional: Solana keypair JSON (same format as solana-keygen). Only pubkey is stored in DB.
      # KEYPAIR_PATH: /capture/keypair.json
      PAPER_TRADING: "1"
    volumes:
      - ./capture:/capture
